name: Keep Streamlit App Awake

on:
  schedule:
    # This runs every 10 hours (Streamlit sleeps after 12 hours of inactivity)
    - cron: '0 */10 * * *'
  workflow_dispatch: # This allows you to run it manually for testing

jobs:
  auto_commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare empty commit
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "Keep-awake ping (automated)"
          git push